<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JamiiSimNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b2b26, #1e4a3b);
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e4a3b;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .input-group { margin-bottom: 1rem; }
        .input-group label { font-weight: 600; color: #1f2e2a; display: block; margin-bottom: 0.3rem; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1.5px solid #e2e8f0;
            font-size: 1rem;
        }
        .btn {
            background: #1e4a3b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #0f3b2f; }
        .btn-secondary {
            background: #eef3f0;
            color: #1e4a3b;
            margin-top: 0;
        }
        .btn-secondary:hover { background: #2c7a5e; color: white; }
        
        .dashboard { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: #0c2b25;
            color: white;
            padding: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .sidebar .logo { font-size: 1.3rem; font-weight: 700; margin-bottom: 2rem; }
        .sidebar nav ul { list-style: none; }
        .sidebar nav ul li { margin: 0.5rem 0; }
        .sidebar nav ul li button {
            background: transparent;
            border: none;
            color: #cbdcd6;
            width: 100%;
            text-align: left;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .sidebar nav ul li button:hover, .sidebar nav ul li .active {
            background: rgba(44,122,94,0.4);
            color: white;
        }
        .main-content { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .card { background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #f8fbf9; padding: 1rem; border-radius: 20px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #1e4a3b; }
        .stat-label { font-size: 0.75rem; color: #5b6e69; }
        
        .vertical-form { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .form-group label { font-weight: 600; color: #1e4a3b; font-size: 0.85rem; }
        .form-group input {
            padding: 10px 14px;
            border-radius: 25px;
            border: 1.5px solid #e2edeb;
            font-size: 0.9rem;
        }
        .form-group input:read-only { background: #f5f5f5; }
        
        .table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid #eef2f0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #f8fbf9; padding: 12px; text-align: left; font-weight: 600; color: #1e4a3b; }
        td { padding: 10px 12px; border-bottom: 1px solid #eef2f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f8fbf9; }
        
        .badge-active { background: #e8f5e9; color: #2b7e5a; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge-inactive { background: #ffebee; color: #c2410c; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        
        .action-btn {
            background: #1e4a3b;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .action-btn:hover { background: #0f3b2f; }
        
        .submenu { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
        .submenu button {
            background: #f1f5f9;
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .submenu button.active { background: #1e4a3b; color: white; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e4a3b;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
        }
        .loading { text-align: center; padding: 2rem; color: #2c7a5e; }
        .error { color: #c2410c; text-align: center; padding: 1rem; }
        .success { color: #2b7e5a; text-align: center; padding: 0.5rem; }
        .fetch-info { font-size: 0.75rem; margin-top: 5px; padding: 5px; border-radius: 10px; }
        .fetch-info.success { background: #e8f5e9; color: #2b7e5a; }
        .fetch-info.error { background: #ffebee; color: #c2410c; }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 1rem 0.5rem; }
            .sidebar nav ul li button span { display: none; }
            .sidebar .logo span { display: none; }
            .main-content { padding: 1rem; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ==================== CONFIGURATION ====================
    const API_BASE_URL = "https://script.google.com/macros/s/AKfycbx-ggpKM1cMYW48ojsD3wuy8vkyJP4sLe31KDi4w8sF559e22i8ZvVFydnooGu4lnpQ/exec";
    
    function showToast(msg, isError = false) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#c2410c' : '#1e4a3b';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function apiCall(action, params = {}) {
        let url = `${API_BASE_URL}?action=${action}`;
        Object.keys(params).forEach(key => {
            if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
                url += `&${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`;
            }
        });
        
        console.log("Calling:", url);
        
        try {
            const response = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            console.log("Response:", data);
            return data;
        } catch (err) {
            console.error("API Error:", err);
            return { success: false, error: err.message };
        }
    }
    
    function normalizePhone(phone) {
        if (!phone) return "";
        let normalized = String(phone).replace(/\D/g, '');
        if (normalized.startsWith('254')) normalized = normalized.substring(3);
        else if (normalized.startsWith('0')) normalized = normalized.substring(1);
        return normalized;
    }
    
    function escapeHtml(str) {
        if (str === undefined || str === null) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    let currentUser = null;
    let currentPage = "Home";
    let reportType = "Line";
    
    function render() {
        const app = document.getElementById("app");
        if (!currentUser) {
            app.innerHTML = renderLogin();
            document.getElementById("loginBtn")?.addEventListener("click", doLogin);
            return;
        }
        app.innerHTML = renderDashboard();
        attachMenuEvents();
        loadPageData();
    }
    
    function renderLogin() {
        return `
            <div class="login-container">
                <div class="login-card">
                    <h2><i class="fas fa-bolt"></i> JamiiSimNetwork</h2>
                    <div class="input-group"><label>Username</label><input type="text" id="loginUser" placeholder="admin"></div>
                    <div class="input-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••"></div>
                    <button class="btn" id="loginBtn">Sign In</button>
                    <p style="text-align:center; font-size:0.7rem; margin-top:1rem;"></p>
                    <div id="loginError" style="color:#c2410c; text-align:center; margin-top:0.5rem;"></div>
                </div>
            </div>
        `;
    }
    
    async function doLogin() {
        const username = document.getElementById("loginUser").value;
        const password = document.getElementById("loginPass").value;
        const errorDiv = document.getElementById("loginError");
        
        if (!username || !password) {
            errorDiv.innerHTML = "Enter username and password";
            return;
        }
        
        errorDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Logging in...';
        const result = await apiCall("login", { username, password });
        
        if (result.success) {
            currentUser = username;
            currentPage = "Home";
            render();
            showToast(`Welcome ${username}!`);
        } else {
            errorDiv.innerHTML = result.error || "Invalid credentials";
        }
    }
    
    function renderDashboard() {
        const pages = ["Home", "Line Registration", "Till Registration", "Activation", "Transactions", "Report"];
        const pageKeys = { "Home": "Home", "Line Registration": "LineReg", "Till Registration": "TillReg", "Activation": "Activation", "Transactions": "Transactions", "Report": "Report" };
        
        let content = "";
        if (currentPage === "Home") content = '<div id="pageContent"><div class="loading">Loading dashboard...</div></div>';
        else if (currentPage === "LineReg") content = renderLineReg();
        else if (currentPage === "TillReg") content = renderTillReg();
        else if (currentPage === "Activation") content = '<h3><i class="fas fa-toggle-on"></i> Till Activation</h3><div id="activationContent"><div class="loading">Loading tills...</div></div>';
        else if (currentPage === "Transactions") content = '<h3><i class="fas fa-exchange-alt"></i> Unit Transactions</h3><div id="transactionsContent"><div class="loading">Loading tills...</div></div>';
        else if (currentPage === "Report") content = renderReportPage();
        
        return `
            <div class="dashboard">
                <div class="sidebar">
                    <div class="logo"><i class="fas fa-charging-station"></i> <span>JamiiSimNetwrok</span></div>
                    <nav><ul>
                        ${pages.map(p => `<li><button class="${currentPage === pageKeys[p] ? 'active' : ''}" data-page="${pageKeys[p]}"><i class="fas ${getIcon(pageKeys[p])}"></i> <span>${p}</span></button></li>`).join('')}
                        <li style="margin-top:2rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:1rem;"><button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button></li>
                    </ul></nav>
                </div>
                <div class="main-content"><div class="card">${content}</div></div>
            </div>
        `;
    }
    
    function getIcon(page) {
        const icons = { Home: "fa-home", LineReg: "fa-user-plus", TillReg: "fa-cash-register", Activation: "fa-toggle-on", Transactions: "fa-exchange-alt", Report: "fa-chart-line" };
        return icons[page] || "fa-circle";
    }
    
    function renderLineReg() {
        return `
            <h3><i class="fas fa-user-plus"></i> Register New Line</h3>
            <div class="vertical-form" style="margin-top:1rem;">
                <div class="form-group"><label>Full Name</label><input type="text" id="lineName" placeholder="John Doe"></div>
                <div class="form-group"><label>ID Number</label><input type="text" id="lineId" placeholder="ID123456"></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="linePhone" placeholder="0712345678"></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="lineDob"></div>
                <button class="btn" id="saveLineBtn">Register Line</button>
                <div id="lineFeedback"></div>
            </div>
        `;
    }
    
    function renderTillReg() {
        return `
            <h3><i class="fas fa-cash-register"></i> Register New Till</h3>
            <div class="vertical-form" style="margin-top:1rem;">
                <div class="form-group">
                    <label>Phone Number (Lookup Line)</label>
                    <input type="tel" id="fetchPhone" placeholder="0712345678">
                    <button class="btn btn-secondary" id="fetchLineBtn" style="margin-top:5px;">🔍 Fetch Line Data</button>
                    <div id="fetchInfo" class="fetch-info"></div>
                </div>
                <div class="form-group"><label>Full Name</label><input type="text" id="tillName" readonly placeholder="Will auto-fill"></div>
                <div class="form-group"><label>ID Number</label><input type="text" id="tillId" readonly placeholder="Will auto-fill"></div>
                <div class="form-group"><label>Date of Birth</label><input type="text" id="tillDob" readonly placeholder="Will auto-fill"></div>
                <div class="form-group"><label>Till Number</label><input type="text" id="tillNumber" placeholder="T001"></div>
                <div class="form-group"><label>Store Number</label><input type="text" id="storeNumber" placeholder="STR01"></div>
                <div class="form-group"><label>Operator ID</label><input type="text" id="operatorId" readonly placeholder="Auto-generated"></div>
                <button class="btn" id="saveTillBtn">Register Till</button>
                <div id="tillFeedback"></div>
            </div>
        `;
    }
    
    function renderReportPage() {
        return `
            <h3><i class="fas fa-chart-line"></i> Reports</h3>
            <div class="submenu">
                <button class="${reportType === 'Line' ? 'active' : ''}" data-report="Line">📋 Line Report</button>
                <button class="${reportType === 'Till' ? 'active' : ''}" data-report="Till">🏪 Till Report</button>
            </div>
            <div id="reportContent"><div class="loading">Loading report...</div></div>
        `;
    }
    
    async function loadPageData() {
        if (currentPage === "Home") await loadHomeStats();
        if (currentPage === "Activation") await loadActivationTable();
        if (currentPage === "Transactions") await loadTransactionsTable();
        if (currentPage === "Report") await loadReportContent();
    }
    
    async function loadHomeStats() {
        const container = document.getElementById("pageContent");
        if (!container) return;
        
        const stats = await apiCall("getStats");
        if (stats.success) {
            container.innerHTML = `
                <h3><i class="fas fa-chart-pie"></i> Dashboard Overview</h3>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${stats.totalLines || 0}</div><div class="stat-label">Total Lines</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.activeTills || 0}</div><div class="stat-label">Active Tills</div></div>
                    <div class="stat-card"><div class="stat-value">KES ${(stats.commission || 0).toLocaleString()}</div><div class="stat-label">Commission (Lines × 50)</div></div>
                    <div class="stat-card"><div class="stat-value">KES ${(stats.salary || 0).toLocaleString()}</div><div class="stat-label">Salary (Active Tills × 200)</div></div>
                </div>
            `;
        } else {
            container.innerHTML = `<div class="error">⚠️ Error: ${stats.error}</div>`;
        }
    }
    
    async function loadActivationTable() {
        const container = document.getElementById("activationContent");
        if (!container) return;
        
        const result = await apiCall("getTills");
        const tills = result.tills || [];
        
        if (!result.success || tills.length === 0) {
            container.innerHTML = `<div class="error">No tills found. ${result.error || ''}</div>`;
            return;
        }
        
        let html = `<div class="table-wrapper">能<table>
                        <thead>
                            <tr><th>Name</th><th>Till Number</th><th>Store</th><th>Status</th><th>Action</th>
                            </thead>
                        <tbody>`;
        
        tills.forEach(till => {
            const isActive = till.status === "active";
            html += `<tr>
                        <td>${escapeHtml(till.name || "-")}</div>
                        <td>${escapeHtml(till.tillNumber || "-")}</div>
                        <td>${escapeHtml(till.storeNumber || "-")}</div>
                        <td>${isActive ? '<span class="badge-active">✓ Active</span>' : '<span class="badge-inactive">⏳ Inactive</span>'}</div>
                        <td>${!isActive ? `<button class="action-btn activate-btn" data-row="${till.rowIndex}">🔑 Activate</button>` : '<span style="color:#2b7e5a;">✓ Activated</span>'}</div>
                     </tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
        
        document.querySelectorAll(".activate-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const pin = prompt("Enter Start PIN (4-6 digits):");
                if (pin && pin.length >= 4) {
                    const res = await apiCall("activateTill", { rowIndex: parseInt(btn.dataset.row), startPin: pin });
                    if (res.success) {
                        showToast("✅ Till activated successfully!");
                        await loadActivationTable();
                    } else {
                        showToast("❌ Activation failed: " + res.error, true);
                    }
                } else {
                    showToast("PIN required (min 4 digits)", true);
                }
            });
        });
    }
    
    async function loadTransactionsTable() {
        const container = document.getElementById("transactionsContent");
        if (!container) return;
        
        const result = await apiCall("getTills");
        const tills = result.tills || [];
        
        if (!result.success || tills.length === 0) {
            container.innerHTML = `<div class="error">No tills found.</div>`;
            return;
        }
        
        let html = `<div class="table-wrapper">能<table>
                        <thead>
                            <tr><th>Name</th><th>Till Number</th><th>Store</th><th>Current Units</th><th>Action</th>
                            </thead>
                        <tbody>`;
        
        tills.forEach(till => {
            html += `<tr>
                        <td>${escapeHtml(till.name || "-")}</div>
                        <td>${escapeHtml(till.tillNumber || "-")}</div>
                        <td>${escapeHtml(till.storeNumber || "-")}</div>
                        <td><span style="font-weight:700; font-size:1.1rem;">${till.units || 0}</span> units</div>
                        <td><button class="action-btn update-btn" data-row="${till.rowIndex}">➕ Add Units</button></div>
                     <tr>`;
        });
        html += `</tbody>}</div>`;
        container.innerHTML = html;
        
        document.querySelectorAll(".update-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const add = prompt("Enter number of units to ADD:");
                if (add && !isNaN(parseFloat(add)) && parseFloat(add) > 0) {
                    const res = await apiCall("updateUnits", { rowIndex: parseInt(btn.dataset.row), addUnits: parseFloat(add) });
                    if (res.success) {
                        showToast(`✅ Units updated to ${res.newUnits}`);
                        await loadTransactionsTable();
                    } else {
                        showToast("❌ Update failed: " + res.error, true);
                    }
                } else {
                    showToast("Please enter a valid positive number", true);
                }
            });
        });
    }
    
    async function loadReportContent() {
        const container = document.getElementById("reportContent");
        if (!container) return;
        
        if (reportType === "Line") {
            const result = await apiCall("getLines");
            const lines = result.lines || [];
            if (!lines.length) {
                container.innerHTML = `<div class="error">No lines registered yet.</div>`;
                return;
            }
            let html = `<div class="table-wrapper">能<table>
                            <thead>
                                <tr><th>Name</th><th>ID Number</th><th>Phone</th><th>Date of Birth</th><th>Date Created</th>
                                </thead>
                            <tbody>`;
            lines.forEach(l => {
                html += `<tr>
                            <td>${escapeHtml(l.name)}</div>
                            <td>${escapeHtml(l.idNumber)}</div>
                            <td>${escapeHtml(l.phone)}</div>
                            <td>${escapeHtml(l.dob)}</div>
                            <td>${l.dateCreated ? new Date(l.dateCreated).toLocaleDateString() : '-'}</div>
                          </tr>`;
            });
            html += `</tbody>}</div>`;
            container.innerHTML = html;
        } else {
            const result = await apiCall("getTills");
            const tills = result.tills || [];
            if (!tills.length) {
                container.innerHTML = `<div class="error">No tills registered yet.</div>`;
                return;
            }
            let html = `<div class="table-wrapper">能<table>
                            <thead>
                                <tr><th>Name</th><th>Till Number</th><th>Store</th><th>Operator ID</th><th>Units</th><th>Status</th><th>Date Created</th>
                                </thead>
                            <tbody>`;
            tills.forEach(t => {
                html += `<tr>
                            <td>${escapeHtml(t.name)}</div>
                            <td>${escapeHtml(t.tillNumber)}</div>
                            <td>${escapeHtml(t.storeNumber)}</div>
                            <td>${escapeHtml(t.operatorId)}</div>
                            <td><span style="font-weight:600;">${t.units || 0}</span></div>
                            <td>${t.status === "active" ? '<span class="badge-active">Active</span>' : '<span class="badge-inactive">Inactive</span>'}</div>
                            <td>${t.dateCreated ? new Date(t.dateCreated).toLocaleDateString() : '-'}</div>
                          </tr>`;
            });
            html += `</tbody>}</div>`;
            container.innerHTML = html;
        }
    }
    
    function attachMenuEvents() {
        document.querySelectorAll("[data-page]").forEach(btn => {
            btn.addEventListener("click", () => {
                currentPage = btn.dataset.page;
                render();
            });
        });
        
        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            currentUser = null;
            render();
            showToast("Logged out");
        });
        
        // Line Registration
        if (currentPage === "LineReg") {
            document.getElementById("saveLineBtn")?.addEventListener("click", async () => {
                const name = document.getElementById("lineName").value.trim();
                const idNumber = document.getElementById("lineId").value.trim();
                let phone = document.getElementById("linePhone").value.trim();
                const dob = document.getElementById("lineDob").value;
                const feedback = document.getElementById("lineFeedback");
                
                if (!name || !idNumber || !phone || !dob) {
                    feedback.innerHTML = '<span style="color:#c2410c;">❌ All fields required</span>';
                    return;
                }
                phone = phone.replace(/\D/g, '');
                feedback.innerHTML = '<span style="color:#2c7a5e;"><i class="fas fa-spinner fa-pulse"></i> Registering...</span>';
                const res = await apiCall("registerLine", { name, idNumber, phone, dob });
                if (res.success) {
                    feedback.innerHTML = '<span style="color:#2b7e5a;">✅ Line registered successfully!</span>';
                    document.getElementById("lineName").value = "";
                    document.getElementById("lineId").value = "";
                    document.getElementById("linePhone").value = "";
                    document.getElementById("lineDob").value = "";
                    showToast("Line registered!");
                    setTimeout(() => feedback.innerHTML = "", 2000);
                } else {
                    feedback.innerHTML = `<span style="color:#c2410c;">❌ ${res.error}</span>`;
                }
            });
        }
        
        // Till Registration with FIXED fetch
        if (currentPage === "TillReg") {
            const fetchBtn = document.getElementById("fetchLineBtn");
            if (fetchBtn) {
                fetchBtn.addEventListener("click", async () => {
                    const phoneInput = document.getElementById("fetchPhone");
                    const phone = phoneInput.value.trim();
                    const fetchInfo = document.getElementById("fetchInfo");
                    
                    if (!phone) {
                        fetchInfo.innerHTML = '⚠️ Enter a phone number';
                        fetchInfo.className = 'fetch-info error';
                        return;
                    }
                    
                    fetchInfo.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Searching for line...';
                    fetchInfo.className = 'fetch-info';
                    
                    const res = await apiCall("getLines");
                    
                    if (!res.success || !res.lines) {
                        fetchInfo.innerHTML = '❌ Error fetching lines';
                        fetchInfo.className = 'fetch-info error';
                        return;
                    }
                    
                    const normalizedInput = normalizePhone(phone);
                    const found = res.lines.find(line => normalizePhone(line.phone) === normalizedInput);
                    
                    if (found) {
                        document.getElementById("tillName").value = found.name;
                        document.getElementById("tillId").value = found.idNumber;
                        document.getElementById("tillDob").value = found.dob;
                        
                        const nameParts = found.name.trim().split(/\s+/);
                        let operatorId = "";
                        if (nameParts.length === 1) {
                            operatorId = nameParts[0].substring(0, 2).toUpperCase();
                        } else {
                            operatorId = (nameParts[0].charAt(0) + nameParts[nameParts.length - 1].charAt(0)).toUpperCase();
                        }
                        document.getElementById("operatorId").value = operatorId;
                        
                        fetchInfo.innerHTML = `✅ Line found: ${found.name} (${found.phone})`;
                        fetchInfo.className = 'fetch-info success';
                        showToast("Line found! You can now register the till.");
                    } else {
                        fetchInfo.innerHTML = `❌ No line found with phone: ${phone}. Available phones: ${res.lines.map(l => l.phone).join(", ")}`;
                        fetchInfo.className = 'fetch-info error';
                        showToast("No line found with this phone number. Please register the line first.", true);
                        
                        document.getElementById("tillName").value = "";
                        document.getElementById("tillId").value = "";
                        document.getElementById("tillDob").value = "";
                        document.getElementById("operatorId").value = "";
                    }
                });
            }
            
            document.getElementById("saveTillBtn")?.addEventListener("click", async () => {
                let phone = document.getElementById("fetchPhone").value.trim();
                phone = phone.replace(/\D/g, '');
                
                const payload = {
                    phone: phone,
                    name: document.getElementById("tillName").value,
                    idNumber: document.getElementById("tillId").value,
                    dob: document.getElementById("tillDob").value,
                    tillNumber: document.getElementById("tillNumber").value.trim(),
                    storeNumber: document.getElementById("storeNumber").value.trim(),
                    operatorId: document.getElementById("operatorId").value
                };
                const feedback = document.getElementById("tillFeedback");
                
                if (!payload.phone || !payload.tillNumber || !payload.storeNumber || !payload.name) {
                    feedback.innerHTML = '<span style="color:#c2410c;">❌ Please fetch a valid line first and fill all fields</span>';
                    return;
                }
                
                feedback.innerHTML = '<span style="color:#2c7a5e;"><i class="fas fa-spinner fa-pulse"></i> Registering till...</span>';
                const res = await apiCall("registerTill", payload);
                
                if (res.success) {
                    feedback.innerHTML = '<span style="color:#2b7e5a;">✅ Till registered successfully!</span>';
                    document.getElementById("tillNumber").value = "";
                    document.getElementById("storeNumber").value = "";
                    showToast("Till registered!");
                    setTimeout(() => feedback.innerHTML = "", 2000);
                } else {
                    feedback.innerHTML = `<span style="color:#c2410c;">❌ ${res.error}</span>`;
                }
            });
        }
        
        if (currentPage === "Report") {
            document.querySelectorAll("[data-report]").forEach(btn => {
                btn.addEventListener("click", () => {
                    reportType = btn.dataset.report;
                    render();
                });
            });
        }
    }
    
    render();
</script>
</body>
</html>
